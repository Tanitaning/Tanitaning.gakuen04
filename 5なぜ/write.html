 <table id="table" border="1"  cellpadding="10">
    <tr>
      <th>
        <h1>5なぜ報告書</h1>
      </th>
      <th>
         <label for="FirstName" class="form-label-name">名前</label>
         <input type="text" id="FirstName" name="FirstName" value="" class="form-name">
        </th>
    </tr>
 
     <td>  
      <label for="BirthDate" class="form-label required">発生日時</label>
      <input type="date" id="BirthDate" name="BirthDate" value="" class="form-year">
     </td>
 
      <td>
       <label for="FirstName" class="form-product-name">品名</label>
       <input type="text" id="productName" name="FirstName" value="" class="form-product-name">
     </td>
     
    </tr>
   
    <tr>
 
      <td>
        <label for="place" class="form-label">発生場所</label>
       <select name="fruits" id="place" class="form-select">
          <option name="00">選択してください 。</option>
          <option name="01">学園</option>
          <option name="02">職場</option>
          <option name="03">バス内</option>
          <option name="04">寮</option>
           <option name="99">その他</option>
       </td>
 
      <td>
         <label for="FirstName" class="form-human-name">対応指導員</label>
         <input type="text" id="teacher" name="FirstName" value="" class="form-human-name">
         
      </td>
     
    </tr>
 
    <tr>
     
      <td>
        <label for="FirstName" class="form-label required">発生状況</label>
         <input type="text" id="situation" name="FirstName" value="" class="form-input">
       </td>
                   
        <td>
            <label for="FirstName" class="form-content">指導内容</label>
                    <input type="text" id="content" name="FirstName" value="" class="form-input">
        </td>
     </tr>
 
     <tr>
 
        <td colspan="2">
         原因
        </td>
 
     </tr>
   
  </table>
 
  <table id="table2" border="1"  cellpadding="10">

          <td class="onenaze">
