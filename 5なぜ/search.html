<h3>ユーザー検索</h3>
  <input id="query" placeholder="名前やメールで検索">
  <button id="searchBtn">検索</button>
  <button id="saveBtn">サンプルユーザー保存</button>
  <ul id="list"></ul>

  <script>
    const queryEl = document.getElementById('query');
    const listEl = document.getElementById('list');

    // サンプルユーザー保存
    document.getElementById('saveBtn').addEventListener('click', () => {
      const users = [
        { id: 1, name: '山田太郎', email: 'taro@example.com' },
        { id: 2, name: '鈴木花子', email: 'hanako@example.com' },
        { id: 3, name: '佐藤次郎', email: 'jiro@example.net' }
      ];
      localStorage.setItem('users', JSON.stringify(users));
      alert('ユーザーを保存しました');
    });

    // 検索関数
    function searchUsers(q) {
      const raw = localStorage.getItem('users');
      if (!raw) return [];
      let users;
      try { users = JSON.parse(raw); } catch (e) { return []; }

      q = (q || '').trim().toLowerCase();
      if (!q) return users;

      // name または email に q を含むものを返す
      return users.filter(u =>
        (u.name && u.name.toLowerCase().includes(q)) ||
        (u.email && u.email.toLowerCase().includes(q))
      );
    }

    // 検索ボタン
    document.getElementById('searchBtn').addEventListener('click', () => {
      const q = queryEl.value;
      const results = searchUsers(q);
      listEl.innerHTML = '';
      if (results.length === 0) {
        listEl.innerHTML = '<li>見つかりませんでした</li>';
        return;
      }
      results.forEach(u => {
        const li = document.createElement('li');
        li.textContent = `${u.name} (${u.email})`;
        listEl.appendChild(li);
      });
    });
  </script>
