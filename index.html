    <script>
      // グラフを描画するためのキャンバス要素を生成する関数
      const result = document.getElementById("js-result");
      const createCanvas = () => {
        const canvas = document.createElement("canvas");
        canvas.width = 400;
        canvas.height = 200;
        result.appendChild(canvas);
        return canvas;
      };

      // ここに試したいchart機能を入れます
      const barChart = new Chart(createCanvas(), {
  type: "bar",
  data: {
    labels: ["学園", "職場", "バス内", "寮", "その他",],
    datasets: [{
      label: " 発生場所　年間統計棒グラフ",
      data: [12, 8, 19, 5, 2,],
      backgroundColor: [
        "rgba(255, 99, 132, 0.5)",
        "rgba(54, 162, 235, 0.5)",
        "rgba(255, 206, 86, 0.5)",
        "rgba(75, 192, 192, 0.5)",
        "rgba(153, 102, 255, 0.5)",
      ],
      borderColor: [
        "rgba(255, 99, 132, 1)",
        "rgba(54, 162, 235, 1)",
        "rgba(255, 206, 86, 1)",
        "rgba(75, 192, 192, 1)",
        "rgba(153, 102, 255, 1)",
      ],
      borderWidth: 1,
    }],
  },
  options: {
    scales: {
      y: {
        beginAtZero: true,
      },
    },
  },
});
